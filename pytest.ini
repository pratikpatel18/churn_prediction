[pytest]
testpaths         = tests
python_files      = test_*.py
python_classes    = Test*
python_functions  = test_*
addopts           =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
asyncio_mode      = auto
log_cli           = true
log_cli_level     = INFO
log_format        = %(asctime)s %(levelname)s %(message)s
log_date_format   = %H:%M:%S
